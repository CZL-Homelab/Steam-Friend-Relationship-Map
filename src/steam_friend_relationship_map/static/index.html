<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Steam 好友关系图谱</title>
    <link rel="stylesheet" href="/static/styles.css" />
    <script src="https://unpkg.com/cytoscape@3.30.4/dist/cytoscape.min.js"></script>
    <script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js"></script>
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">S</div>
          <div>
            <h1 data-i18n="app.title">Steam 好友关系图谱</h1>
            <p data-i18n="app.subtitle">Neo4j 本地图数据库</p>
          </div>
        </div>
        <div class="language-switch" role="group" aria-label="Language">
          <button class="lang-button active" data-lang="zh-CN">中文</button>
          <button class="lang-button" data-lang="en">English</button>
        </div>

        <section class="panel">
          <div class="panel-title">
            <span data-i18n="section.connection">连接</span>
            <button class="icon-button" id="testSettings" title="测试连接" data-i18n-title="action.testConnection"><i data-lucide="plug-zap"></i></button>
          </div>
          <div class="status-grid">
            <div>
              <span class="muted">Steam</span>
              <strong id="steamStatus" data-status="unknown">未知</strong>
            </div>
            <div>
              <span class="muted">Neo4j</span>
              <strong id="neo4jStatus" data-status="unknown">未知</strong>
            </div>
          </div>
        </section>

        <section class="panel">
          <div class="panel-title">
            <span data-i18n="section.crawl">抓取</span>
            <button class="icon-button danger" id="cancelCrawl" title="取消抓取" data-i18n-title="action.cancelCrawl"><i data-lucide="square"></i></button>
          </div>
          <label data-i18n-label="field.rootUrl">
            Root URL
            <input id="rootUrl" placeholder="https://steamcommunity.com/id/..." data-i18n-placeholder="placeholder.rootUrl" />
          </label>
          <div class="two-col">
            <label data-i18n-label="field.depth">
              层数
              <input id="maxDepth" type="number" min="1" max="4" value="2" />
            </label>
            <label data-i18n-label="field.nodes">
              节点数
              <input id="maxNodes" type="number" min="1" max="10000" value="2000" />
            </label>
          </div>
          <label data-i18n-label="field.delay">
            延迟 ms
            <input id="delayMs" type="number" min="0" max="10000" value="300" />
          </label>
          <button class="primary" id="startCrawl"><i data-lucide="radar"></i><span data-i18n="action.startCrawl">开始抓取</span></button>
          <div class="progress">
            <div class="progress-row"><span data-i18n="metric.status">状态</span><strong id="crawlStatus" data-status="idle">空闲</strong></div>
            <div class="progress-row"><span data-i18n="metric.nodes">节点</span><strong id="nodeCount">0</strong></div>
            <div class="progress-row"><span data-i18n="metric.edges">关系</span><strong id="edgeCount">0</strong></div>
            <div class="progress-row"><span data-i18n="metric.private">私密</span><strong id="privateCount">0</strong></div>
          </div>
        </section>

        <section class="panel">
          <div class="panel-title">
            <span data-i18n="section.filters">筛选</span>
            <button class="icon-button" id="refreshGraph" title="刷新图谱" data-i18n-title="action.refreshGraph"><i data-lucide="refresh-cw"></i></button>
          </div>
          <label data-i18n-label="field.rootSteamId">
            Root SteamID
            <input id="graphRoot" placeholder="7656..." data-i18n-placeholder="placeholder.steamId" />
          </label>
          <div class="two-col">
            <label data-i18n-label="field.depth">
              层数
              <input id="graphDepth" type="number" min="0" max="4" value="2" />
            </label>
            <label data-i18n-label="field.limit">
              限制
              <input id="graphLimit" type="number" min="1" max="2000" value="500" />
            </label>
          </div>
          <label data-i18n-label="field.search">
            搜索
            <input id="graphSearch" placeholder="昵称 / SteamID" data-i18n-placeholder="placeholder.search" />
          </label>
          <label data-i18n-label="field.category">
            分类
            <input id="graphCategory" placeholder="现实 / 游戏群 / ..." data-i18n-placeholder="placeholder.category" />
          </label>
        </section>
      </aside>

      <section class="workspace">
        <header class="topbar">
          <div>
            <h2 data-i18n="section.graph">关系图谱</h2>
            <p id="graphSummary">0 个节点 · 0 条关系</p>
          </div>
          <div class="toolbar">
            <button class="tool" id="fitGraph" title="适配视图" data-i18n-title="action.fitGraph"><i data-lucide="maximize"></i></button>
            <button class="tool" id="layoutGraph" title="重新布局" data-i18n-title="action.layoutGraph"><i data-lucide="network"></i></button>
            <button class="tool" id="exportJson" title="导出 JSON" data-i18n-title="action.exportJson"><i data-lucide="braces"></i></button>
            <button class="tool" id="exportCsv" title="导出 CSV" data-i18n-title="action.exportCsv"><i data-lucide="download"></i></button>
          </div>
        </header>
        <div id="graph"></div>
      </section>

      <aside class="inspector">
        <section class="profile-card" id="profileCard">
          <img id="profileAvatar" src="" alt="" />
          <div class="profile-body">
            <h3 id="profileName" data-i18n="profile.empty">选择一个节点</h3>
            <a id="profileUrl" href="#" target="_blank" rel="noreferrer">Steam profile</a>
            <dl>
              <div><dt>SteamID</dt><dd id="profileSteamId">-</dd></div>
              <div><dt data-i18n="metric.degree">度数</dt><dd id="profileDegree">0</dd></div>
              <div><dt data-i18n="metric.status">状态</dt><dd id="profileStatus" data-status="unknown">未知</dd></div>
            </dl>
            <label data-i18n-label="field.category">
              分类
              <input id="profileCategory" />
            </label>
            <label data-i18n-label="field.tags">
              标签
              <input id="profileTags" placeholder="标签1, 标签2" data-i18n-placeholder="placeholder.tags" />
            </label>
            <label data-i18n-label="field.note">
              备注
              <textarea id="profileNote" rows="5"></textarea>
            </label>
            <button id="saveProfile" class="secondary"><i data-lucide="save"></i><span data-i18n="action.save">保存</span></button>
          </div>
        </section>

        <section class="panel">
          <div class="panel-title">
            <span data-i18n="section.shortestPath">最短路径</span>
            <button class="icon-button" id="findPath" title="查询路径" data-i18n-title="action.findPath"><i data-lucide="route"></i></button>
          </div>
          <label data-i18n-label="field.from">
            起点
            <input id="pathFrom" placeholder="SteamID" data-i18n-placeholder="placeholder.steamId" />
          </label>
          <label data-i18n-label="field.to">
            终点
            <input id="pathTo" placeholder="SteamID" data-i18n-placeholder="placeholder.steamId" />
          </label>
          <div id="pathResult" class="path-result" data-i18n="path.empty">未选择路径</div>
        </section>

        <section class="panel">
          <div class="panel-title">
            <span data-i18n="section.centralNodes">中心节点</span>
            <button class="icon-button" id="loadTopDegree" title="刷新排行" data-i18n-title="action.loadTopDegree"><i data-lucide="bar-chart-3"></i></button>
          </div>
          <ol id="topDegreeList" class="rank-list"></ol>
        </section>

        <section class="panel">
          <div class="panel-title">
            <span>Bloom Cypher</span>
            <button class="icon-button" id="copyBloom" title="复制查询" data-i18n-title="action.copyBloom"><i data-lucide="copy"></i></button>
          </div>
          <textarea id="bloomQuery" rows="7" readonly>MATCH p=(r:SteamUser {steam_id:$root})-[:STEAM_FRIEND*1..3]-(n) RETURN p LIMIT 500

MATCH p=shortestPath((a:SteamUser {steam_id:$from})-[:STEAM_FRIEND*..4]-(b:SteamUser {steam_id:$to})) RETURN p</textarea>
        </section>
      </aside>
    </main>
    <div id="toast" class="toast"></div>
    <script src="/static/app.js"></script>
  </body>
</html>
